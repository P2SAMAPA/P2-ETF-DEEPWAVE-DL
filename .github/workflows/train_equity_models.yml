name: Train Equity Models (A, B, C)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model(s) to train: all | a | b | c | a,b etc."
        required: false
        default: "all"
      start_year:
        description: "Training start year (used when sweep_mode is empty)"
        required: false
        default: "2008"
      sweep_mode:
        description: "Comma‑separated sweep years (e.g. 2008,2013,2015). Leave empty for single run."
        required: false
        default: ""

jobs:
  # Single‑year job (when sweep_mode is empty)
  train-equity-single:
    if: ${{ github.event.inputs.sweep_mode == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Download data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import shutil, os
          from huggingface_hub import hf_hub_download
          import config
          token = os.environ.get("HF_TOKEN")
          os.makedirs(config.DATA_DIR, exist_ok=True)
          for f in ["etf_price","etf_ret","etf_vol",
                    "bench_price","bench_ret","bench_vol","macro"]:
              try:
                  dl = hf_hub_download(repo_id=config.HF_DATASET_REPO,
                                       filename=f"data/{f}.parquet",
                                       repo_type="dataset", token=token,
                                       force_download=True)
                  shutil.copy(dl, os.path.join(config.DATA_DIR, f"{f}.parquet"))
                  print(f"✓ data/{f}.parquet")
              except Exception as e:
                  print(f"✗ {f}: {e}")
          EOF
      - name: Train equity models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python train_equity.py \
            --model      "${{ github.event.inputs.model }}" \
            --start_year ${{ github.event.inputs.start_year }}
      - name: Push results & prediction
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python predict_equity.py
          python << 'EOF'
          import os, glob
          from huggingface_hub import HfApi, CommitOperationAdd
          import config
          token = os.environ.get("HF_TOKEN")
          api = HfApi(token=token)
          # Push weights
          files = (glob.glob(os.path.join(config.MODELS_DIR, "model_*_eq", "**", "*.keras"), recursive=True) +
                   glob.glob(os.path.join(config.MODELS_DIR, "scaler_eq_*.pkl")) +
                   [os.path.join(config.MODELS_DIR, "training_summary_equity.json")])
          files = [f for f in files if os.path.exists(f)]
          ops = [CommitOperationAdd(path_in_repo=f, path_or_fileobj=f) for f in files]
          if ops:
              api.create_commit(repo_id=config.HF_DATASET_REPO, repo_type="dataset",
                                operations=ops, commit_message="[auto] Update equity model weights")
              print(f"✓ Pushed {len(ops)} equity file(s) to HF")
          # Push prediction JSON
          if os.path.exists("latest_prediction_equity.json"):
              api.upload_file(path_or_fileobj="latest_prediction_equity.json",
                              path_in_repo="latest_prediction_equity.json",
                              repo_id=config.HF_DATASET_REPO, repo_type="dataset")
              print("✓ Pushed latest_prediction_equity.json")
          EOF

  # Sweep matrix (runs for each year listed in sweep_mode)
  train-equity-sweep:
    if: ${{ github.event.inputs.sweep_mode != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        year: ${{ fromJson(format('[{0}]', github.event.inputs.sweep_mode)) }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt
      - name: Download data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          # same data download script as above (copy/paste)
          python << 'EOF'
          import shutil, os
          from huggingface_hub import hf_hub_download
          import config
          token = os.environ.get("HF_TOKEN")
          os.makedirs(config.DATA_DIR, exist_ok=True)
          for f in ["etf_price","etf_ret","etf_vol",
                    "bench_price","bench_ret","bench_vol","macro"]:
              try:
                  dl = hf_hub_download(repo_id=config.HF_DATASET_REPO,
                                       filename=f"data/{f}.parquet",
                                       repo_type="dataset", token=token,
                                       force_download=True)
                  shutil.copy(dl, os.path.join(config.DATA_DIR, f"{f}.parquet"))
                  print(f"✓ data/{f}.parquet")
              except Exception as e:
                  print(f"✗ {f}: {e}")
          EOF
      - name: Train equity models for year ${{ matrix.year }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python train_equity.py --model all --start_year ${{ matrix.year }}
      - name: Push sweep JSON to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import os, glob
          from huggingface_hub import HfApi, CommitOperationAdd
          import config
          token = os.environ.get("HF_TOKEN")
          api = HfApi(token=token)
          ops = []
          for f in glob.glob("sweep/eq_sweep_*.json"):
              ops.append(CommitOperationAdd(path_in_repo=f"sweep/{os.path.basename(f)}",
                                            path_or_fileobj=open(f,"rb").read()))
          if ops:
              api.create_commit(repo_id=config.HF_DATASET_REPO, repo_type="dataset",
                                operations=ops, commit_message="Equity sweep results")
              print(f"✓ Pushed {len(ops)} sweep file(s)")
          EOF
