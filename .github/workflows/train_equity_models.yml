name: Train Equity Models (A, B, C)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model(s): all | a | b | c"
        required: false
        default: "all"
      start_year:
        description: "Single start year — leave blank to run ALL years in parallel"
        required: false
        default: ""
    # Hardcoded: epochs=80, wavelet=auto, tsl=12%, z_reentry=0.9, fee=12bps

jobs:
  train_eq_2008:
    if: >
      github.event.inputs.start_year == '' ||
      github.event.inputs.start_year == '2008'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: "pip"}
      - run: pip install -r requirements.txt
      - name: Download data
        run: &download_data |
          python << 'EOF'
          import shutil, os
          from huggingface_hub import hf_hub_download
          import config
          token = os.environ.get("HF_TOKEN")
          os.makedirs(config.DATA_DIR, exist_ok=True)
          for f in ["etf_price","etf_ret","etf_vol","bench_price","bench_ret","bench_vol","macro"]:
              try:
                  dl = hf_hub_download(repo_id=config.HF_DATASET_REPO,
                                       filename=f"data/{f}.parquet",
                                       repo_type="dataset", token=token, force_download=True)
                  shutil.copy(dl, os.path.join(config.DATA_DIR, f"{f}.parquet"))
                  print(f"✓ {f}")
              except Exception as e:
                  print(f"✗ {f}: {e}")
          EOF
      - run: python train_equity.py --model "${{ github.event.inputs.model || 'all' }}" --start_year 2008
      - run: python predict_equity.py
      - run: python evaluate_equity.py --start_year 2008
      - name: Push results to HF (batched)
        run: python .github/scripts/push_eq_results.py --year 2008

  train_eq_2010:
    if: >
      github.event.inputs.start_year == '' ||
      github.event.inputs.start_year == '2010'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
    steps:
