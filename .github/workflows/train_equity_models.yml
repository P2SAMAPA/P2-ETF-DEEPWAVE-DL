name: Train Equity Models (A, B, C)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model(s) to train: all | a | b | c | a,b etc."
        required: false
        default: "all"
      start_year:
        description: "Training start year (e.g. 2008, 2015)"
        required: false
        default: "2008"
    # Hardcoded in config.py — not exposed here:
    #   epochs=80, wavelet=auto, tsl=12%, z_reentry=0.9, fee=12bps

jobs:
  train-equity:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest data from HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import shutil, os
          from huggingface_hub import hf_hub_download
          import config

          token = os.environ.get("HF_TOKEN")
          os.makedirs(config.DATA_DIR, exist_ok=True)
          for f in ["etf_price","etf_ret","etf_vol",
                    "bench_price","bench_ret","bench_vol","macro"]:
              try:
                  dl = hf_hub_download(repo_id=config.HF_DATASET_REPO,
                                       filename=f"data/{f}.parquet",
                                       repo_type="dataset", token=token,
                                       force_download=True)
                  shutil.copy(dl, os.path.join(config.DATA_DIR, f"{f}.parquet"))
                  print(f"✓ data/{f}.parquet")
              except Exception as e:
                  print(f"✗ {f}: {e}")
          EOF

      - name: Train equity models (wavelet auto-selected)
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: |
          python train_equity.py \
            --model      "${{ github.event.inputs.model }}" \
            --start_year ${{ github.event.inputs.start_year }}

      - name: Push equity weights to HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import glob, os
          from huggingface_hub import HfApi, CommitOperationAdd
          import config

          token = os.environ.get("HF_TOKEN")
          api   = HfApi(token=token)

          files = (
              glob.glob(os.path.join(config.MODELS_DIR, "model_*_eq", "**", "*.keras"),
                        recursive=True) +
              glob.glob(os.path.join(config.MODELS_DIR, "scaler_eq_*.pkl")) +
              [os.path.join(config.MODELS_DIR, "training_summary_equity.json")]
          )
          files = [f for f in files if os.path.exists(f)]

          ops = [CommitOperationAdd(path_in_repo=f, path_or_fileobj=f) for f in files]
          if ops:
              api.create_commit(
                  repo_id=config.HF_DATASET_REPO, repo_type="dataset",
                  operations=ops,
                  commit_message="[auto] Update equity model weights",
              )
              print(f"✓ Pushed {len(ops)} equity file(s) to HF")
          else:
              print("No equity weight files found.")
          EOF

      - name: Run equity prediction
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: python predict_equity.py

      - name: Push prediction to HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import os
          from huggingface_hub import HfApi
          import config

          token = os.environ.get("HF_TOKEN")
          api   = HfApi(token=token)
          if os.path.exists("latest_prediction_equity.json"):
              api.upload_file(
                  path_or_fileobj="latest_prediction_equity.json",
                  path_in_repo="latest_prediction_equity.json",
                  repo_id=config.HF_DATASET_REPO, repo_type="dataset")
              print("✓ Pushed latest_prediction_equity.json")
          EOF

      - name: Summary
        run: |
          python << 'EOF'
          import json, os, config
          path = os.path.join(config.MODELS_DIR, "training_summary_equity.json")
          if os.path.exists(path):
              s = json.load(open(path))
              print(f"Trained at:    {s.get('trained_at')}")
              print(f"Best wavelet:  {s.get('best_wavelet')} (auto-selected)")
              print(f"ETFs ({s.get('n_classes')}): {s.get('etfs')}")
              for k in ["model_a","model_b","model_c"]:
                  if k in s:
                      print(f"  {k}: best_lookback={s[k].get('best_lookback')}d "
                            f"best_wavelet={s[k].get('best_wavelet')} "
                            f"val_acc={s[k].get('best_val_acc',0):.4f}")
          EOF
