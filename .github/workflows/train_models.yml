name: Train Models

on:
  workflow_run:
    workflows: ["Daily Data Update"]
    types: [completed]
  schedule:
    - cron: "0 1 * * 2-6"    # 01:00 UTC daily
  workflow_dispatch:
    inputs:
      model:
        description: "Which model (all / a / b / c)"
        required: false
        default: "all"
      start_year:
        description: "Single start year — leave blank to run ALL years in parallel"
        required: false
        default: ""
    # Hardcoded: epochs=80, wavelet=auto, tsl=12%, z_reentry=0.9, fee=12bps

jobs:
  # ── Parallel job per year ────────────────────────────────────────────────────
  # Each job: train → predict → evaluate → push results/fi_{year}_{today}.json
  # Today's file for that year is overwritten; other years' files untouched.

  train_2008:
    if: >
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.start_year == '' || github.event.inputs.start_year == '2008'))
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HF_TOKEN:        ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: "pip"}
      - run: pip install -r requirements.txt
      - name: Download data
        run: python data_download.py --mode incremental
      - name: Train
        run: python train.py --model "${{ github.event.inputs.model || 'all' }}" --start_year 2008
      - name: Predict
        run: python predict.py
      - name: Evaluate
        run: python evaluate.py --start_year 2008
      - name: Push results to HF
        run: python .github/scripts/push_fi_results.py --year 2008

