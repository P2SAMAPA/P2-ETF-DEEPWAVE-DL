name: Daily Equity Prediction

on:
  schedule:
    - cron: "30 2 * * 1-5"   # 02:30 UTC Mon–Fri — 30 min after FI update at 02:00
  workflow_dispatch:

jobs:
  predict-equity:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest data from HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import shutil, os
          from huggingface_hub import hf_hub_download
          import config

          token = os.environ.get("HF_TOKEN")
          os.makedirs(config.DATA_DIR, exist_ok=True)
          for f in ["etf_price","etf_ret","etf_vol",
                    "bench_price","bench_ret","bench_vol","macro"]:
              try:
                  dl = hf_hub_download(repo_id=config.HF_DATASET_REPO,
                                       filename=f"data/{f}.parquet",
                                       repo_type="dataset", token=token,
                                       force_download=True)
                  shutil.copy(dl, os.path.join(config.DATA_DIR, f"{f}.parquet"))
                  print(f"✓ {f}")
              except Exception as e:
                  print(f"✗ {f}: {e}")
          EOF

      - name: Download equity model weights from HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import shutil, os
          from huggingface_hub import HfApi, hf_hub_download
          import config

          token = os.environ.get("HF_TOKEN")
          api   = HfApi(token=token)
          files = api.list_repo_files(repo_id=config.HF_DATASET_REPO,
                                      repo_type="dataset", token=token)
          for f in files:
              # Equity paths: models/model_a_eq/..., models/model_b_eq/...,
              #               models/model_c_eq/..., models/scaler_eq_*,
              #               models/training_summary_equity.json
              is_eq = ("_eq" in f or "equity" in f)
              if is_eq and f.startswith("models/") and \
                 f.endswith((".keras", ".pkl", ".json")):
                  local = f
                  os.makedirs(os.path.dirname(local), exist_ok=True)
                  try:
                      dl = hf_hub_download(repo_id=config.HF_DATASET_REPO,
                                           filename=f, repo_type="dataset",
                                           token=token, force_download=True)
                      shutil.copy(dl, local)
                      print(f"✓ {f}")
                  except Exception as e:
                      print(f"✗ {f}: {e}")
          EOF

      - name: Run equity prediction
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: python predict_equity.py

      - name: Push prediction to HF Dataset
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          python << 'EOF'
          import os
          from huggingface_hub import HfApi
          import config

          token = os.environ.get("HF_TOKEN")
          api   = HfApi(token=token)
          fname = "latest_prediction_equity.json"
          if os.path.exists(fname):
              api.upload_file(path_or_fileobj=fname, path_in_repo=fname,
                              repo_id=config.HF_DATASET_REPO, repo_type="dataset")
              print(f"✓ Pushed {fname}")
          else:
              print(f"✗ {fname} not found"); exit(1)
          EOF

      - name: Commit prediction to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_prediction_equity.json || true
          git diff --cached --quiet || git commit -m "[auto] Daily equity prediction $(date -u +%Y-%m-%d)"
          git push || true

      - name: Summary
        run: |
          python << 'EOF'
          import json
          try:
              with open("latest_prediction_equity.json") as f:
                  d = json.load(f)
              print(f"As of:        {d.get('as_of_date')}")
              print(f"Winner model: {d.get('winner_model')}")
              print(f"Final signal: {d.get('final_signal')}")
              for tag, p in d.get("predictions", {}).items():
                  print(f"  [{tag}] {p['signal']} | conf={p['confidence']:.1%} | z={p['z_score']:.2f}σ")
              tsl = d.get("tsl_status", {})
              print(f"In CASH: {tsl.get('in_cash', False)}")
          except Exception as e:
              print(f"Error: {e}")
          EOF
